packages:
  - 'apps/*'
  - '!apps/mobile-capacitor'
  - 'packages/*'

onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - 'esbuild'
  - 'onnxruntime-node'
  - 'prisma'
  - 'protobufjs'
  - 'sharp'
  - 'unrs-resolver'

overrides:
  '@protobufjs/utf8@<1.1.1': '1.1.1'
  'brace-expansion@>=5.0.0 <5.0.6': '5.0.6'
  'fast-uri@<3.1.2': '3.1.2'
  'js-yaml@>=4.0.0 <4.2.0': '4.2.0'
  'postcss@<8.5.10': '8.5.19'
  'protobufjs@<7.6.3': '7.6.3'
