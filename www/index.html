<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#090a0c" />
    <title>Vantage</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display",
          sans-serif;
        background: #090a0c;
        color: #f4f4f5;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 38%, rgba(94, 234, 212, 0.12), transparent 35%),
          #090a0c;
      }

      main {
        display: grid;
        justify-items: center;
        gap: 1rem;
      }

      .mark {
        position: relative;
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
      }

      .mark::before {
        content: "";
        position: absolute;
        inset: 0.65rem 0.7rem 0.75rem;
        border-right: 3px solid #5eead4;
        border-bottom: 3px solid #5eead4;
        transform: rotate(45deg);
        filter: drop-shadow(0 0 7px rgba(94, 234, 212, 0.7));
      }

      strong {
        font-size: 1rem;
        letter-spacing: -0.02em;
      }

      span {
        font: 0.65rem ui-monospace, "SFMono-Regular", monospace;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #71717a;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true"></div>
      <strong>Vantage</strong>
      <span>connecting</span>
    </main>
  </body>
</html>
