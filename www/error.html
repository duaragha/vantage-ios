<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#090a0c" />
    <title>Vantage is offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display",
          sans-serif;
        background: #090a0c;
        color: #f4f4f5;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: env(safe-area-inset-top) 1.5rem env(safe-area-inset-bottom);
        box-sizing: border-box;
        background:
          radial-gradient(circle at 50% 35%, rgba(94, 234, 212, 0.1), transparent 32%),
          #090a0c;
      }

      main {
        width: min(100%, 22rem);
        text-align: center;
      }

      .dot {
        width: 0.65rem;
        height: 0.65rem;
        margin: 0 auto 1.25rem;
        border-radius: 999px;
        background: #5eead4;
        box-shadow: 0 0 18px rgba(94, 234, 212, 0.65);
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0.75rem 0 1.5rem;
        color: #a1a1aa;
        font-size: 0.9rem;
        line-height: 1.55;
      }

      button {
        min-height: 3rem;
        width: 100%;
        border: 1px solid rgba(94, 234, 212, 0.3);
        border-radius: 1rem;
        background: rgba(94, 234, 212, 0.1);
        color: #ccfbf1;
        font: inherit;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="dot" aria-hidden="true"></div>
      <h1>can’t reach vantage</h1>
      <p>make sure tailscale is connected and the gaming pc is online.</p>
      <button type="button" onclick="location.reload()">try again</button>
    </main>
  </body>
</html>
